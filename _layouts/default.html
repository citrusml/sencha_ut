          </a>
          
          <a href="https://instagram.com/sencha_ut" class="btn-logo" target="_blank" rel="noopener noreferrer" aria-label="Instagram_@sencha_ut">

          <a href="&#109;&#97;&#105;&#108;&#116;&#111;&#58;&#115;&#101;&#110;&#99;&#104;&#97;&#46;&#115;&#104;&#105;&#110;&#107;&#97;&#110;&#64;&#103;&#109;&#97;&#105;&#108;&#46;&#99;&#111;&#109;" class="btn-logo" aria-label="メールでのお問い合わせ">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
  <script>
    // ローカルスライドショー初期化（各 .local-slideshow に対して動作）
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.local-slideshow').forEach(slideshow => {
        const slides = Array.from(slideshow.querySelectorAll('.local-slide'));
        const dotsContainer = slideshow.querySelector('.local-dots');
        if (!slides.length || !dotsContainer) return;

        let idx = slides.findIndex(s => s.classList.contains('active'));
        if (idx < 0) idx = 0;
        let timer = null;
        const interval = parseInt(slideshow.dataset.interval || '5000', 10);

        slides.forEach((_, i) => {
          const d = document.createElement('span');
          d.className = 'dot';
          if (i === idx) d.classList.add('active');
          d.addEventListener('click', (event) => {
            event.stopPropagation(); // カード全体のリンク誤爆を防止
            show(i);
            resetTimer();
          });
          dotsContainer.appendChild(d);
        });

        const dotEls = Array.from(dotsContainer.querySelectorAll('.dot'));

        function show(n) {
          slides.forEach((s, i) => s.classList.toggle('active', i === n));
          dotEls.forEach((d, i) => d.classList.toggle('active', i === n));
          idx = n;
        }

        function nextSlide() {
          show((idx + 1) % slides.length);
        }

        function resetTimer() {
          if (timer) clearInterval(timer);
          timer = setInterval(nextSlide, interval);
        }

        slideshow.addEventListener('mouseenter', () => {
          if (timer) clearInterval(timer);
        });

        slideshow.addEventListener('mouseleave', () => {
          resetTimer();
        });

        resetTimer();
      });
    });
  </script>
</body>
</html>
